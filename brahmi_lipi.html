background-color: yellow;
color: red;
font-size: 30px;
}
label{
color: blue;
font-size: 20px;
}
#flip-card {
margin: 50px;
  height: 300px;
  width: 300px;
  border: 2px solid blue;
  border-radius: 25px;
  position: relative;
  transform-style: preserve-3d;
  transition: transform 8s ease;
  /* no transform here */
}

#flip-card:hover {
  transform: rotateY(180deg);
  cursor: pointer;
}

#front, #back {
  position: absolute;
  height: 100%;
  width: 100%;
  backface-visibility: hidden;
  color: blue;
  font-size: 100px;
  place-items: center;
  box-shadow: 10px 10px 25px blue;
  border-radius: 25px;
}
#front {
  background-color: yellow;
  z-index: 2;
}
#back {
  background-color: aqua;
  transform: rotateY(180deg);
}
</style>
