<hr><center><h5 id="heading" style= color:blue>*विशेषवक्तव्यम् - अत्र णत्वविधानं न प्रयुक्तम्। तस्मात् प्रयत्नेन समाधेयम्।</h5></center>

<script>
function prathama_eka(){
let vl = document.getElementById("txt").value;
document.getElementById("detail").innerHTML='&#10056;&nbsp;'+vl+'&nbsp;'+"+सुँ  [प्रथमैकवचनविवक्षायां "+'<span style=color:blue;>स्वौजसमौट्छष्टाभ्याम्भिस्ङेभ्याम्भ्यस्ङसिभ्याम्भ्यस्ङसोसाङ्ङ्योस्सुप् (४.१.२)</span>&nbsp;'+"सुँ प्रत्ययः।"+'&nbsp;<span style=color:blue;>सुप्तिङन्तं पदम् (१.४.१४)</span>&nbsp;'+" पदसंज्ञा।]"+'<br>&#10056;&nbsp;'+vl+'&nbsp;'+"+स्"+ '&nbsp;'+"["+'<span style=color:blue;>उपदेशेऽजनुनासिक इत् (१.३.४)</span>&nbsp;'+"अनुनासिकस्य उँकारस्य इत्संज्ञा।"+ '&nbsp;<span style=color:blue;>तस्य लोपः (१.३.९)</span>&nbsp'+"इति लोपः।]"+'<br>&#10056;&nbsp;'+vl+"स्"+'<br>&#10056;&nbsp;'+vl+"रुँ"+'&nbsp;'+"["+'<span style=color:blue;> ससजुषोः रुः (८.२.३३)</span>&nbsp;'+ "पदान्तस्य सकारस्य रुँत्वम्।]"+'<br>&#10056;&nbsp;'+vl+"र्" +'&nbsp;'+"["+'<span style=color:blue;>उपदेशेऽजनुनासिक इत् (१.३.४)</span>&nbsp;'+"अनुनासिकस्य उँकारस्य इत्संज्ञा।"+ '&nbsp;<span style=color:blue;>तस्य लोपः (१.३.९)</span>&nbsp;'+"इति लोपः।]"+'<br>&#10056;&nbsp;'+vl+":"+'&nbsp;'+"["+'<span style=color:blue;>खरवसानयोर्विसर्जनीयः (८.३.१५)</span>&nbsp;'+"अवसाने परे पदान्तरेफस्य विसर्गः।]";
document.getElementById("heading").innerHTML='<u><span id="rupsadhan_heading">'+vl+'</span><span id="rupsadhan_heading">-शब्दरूपसाधनम्</span></u>';
}
function prathama_dwi(){

}

document.getElementById("heading").innerHTML='<u><span id="rupsadhan_heading">'+vl+'</span><span id="rupsadhan_heading">-शब्दरूपसाधनम्</span></u>';
}
