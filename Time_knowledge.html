let circl_val = document.getElementById("circl");

const circleY =75;
const circleR =  60;
//first circle border
getting2D.beginPath();
getting2D.arc(circleX, circleY, circleR+4, 0, 2 * Math.PI);
getting2D.strokeStyle = "yellow";
getting2D.lineWidth = 12;
getting2D.stroke();

//second circle border
getting2D.beginPath();
getting2D.arc(circleX, circleY, circleR+2, 0, 2 * Math.PI);
getting2D.strokeStyle = "green";
getting2D.lineWidth = 8;
getting2D.stroke();

//third circle border
getting2D.beginPath();
getting2D.arc(circleX, circleY, circleR, 0, 2 * Math.PI);
getting2D.strokeStyle = "yellow";
getting2D.lineWidth = 4;
getting2D.stroke();

//center circle
getting2D.beginPath();
getting2D.arc(circleX, circleY, circleR - 58, 0, 2 * Math.PI);
getting2D.strokeStyle = "red";
getting2D.lineWidth = 4;
getting2D.stroke();
 
// clock number drawing
    getting2D.font = circleR*0.15 + "'Lato','Sans-serif','Sahitya'";
    getting2D.textBaseline="middle";
    getting2D.textAlign="center";
    const num_name=["१", "२", "३", "४", "५", "६", "७", "८", "९", "१०", "११", "१२"];
    for( let i=1; i<13; i++){
    let hand = i * Math.PI / 6;     // PI/6 radians=30deg;
    getting2D.rotate(hand);
    getting2D.translate(0, -circleR*0.85);
    getting2D.rotate(-hand);
    getting2D.fillText(num_name[i-1], circleX, circleY);
    getting2D.rotate(hand);
    getting2D.translate(0, circleR*0.85);
    getting2D.rotate(-hand);
}
